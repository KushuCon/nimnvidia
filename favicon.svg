<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="NIM favicon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#031426"/>
      <stop offset="1" stop-color="#020b18"/>
    </linearGradient>
    <linearGradient id="nFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#24eff0"/>
      <stop offset="1" stop-color="#16d4de"/>
